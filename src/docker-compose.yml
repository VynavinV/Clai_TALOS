services:
  talos:
    container_name: clai-talos
    build:
      context: ..
      dockerfile: src/Dockerfile
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      TALOS_DATA_DIR: /data
      WEB_PORT: "8080"
      TZ: "${TZ:-UTC}"
    volumes:
      - talos-data:/data

volumes:
  talos-data:
