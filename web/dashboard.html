<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOT_NAME}} Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .container {
    text-align: center;
    padding: 2rem;
    max-width: 500px;
    width: 100%;
  }

  .pulse-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
  }

  .pulse-ring {
    position: absolute;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    border: 2px solid rgba(99, 179, 237, 0.4);
    animation: pulse-expand 2s ease-out infinite;
  }

  .pulse-ring:nth-child(2) { animation-delay: 0.5s; }
  .pulse-ring:nth-child(3) { animation-delay: 1s; }

  .pulse-core {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 2px solid rgba(99, 179, 237, 0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-glow 2s ease-in-out infinite;
    overflow: hidden;
  }

  .pulse-core img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }

  @keyframes pulse-expand {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  @keyframes pulse-glow {
    0%, 100% { box-shadow: 0 0 20px rgba(99, 179, 237, 0.2); }
    50% { box-shadow: 0 0 40px rgba(99, 179, 237, 0.4); }
  }

  .standby-text {
    font-size: 1.1rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(99, 179, 237, 0.7);
    margin-bottom: 2.5rem;
    animation: text-fade 2s ease-in-out infinite;
  }

  @keyframes text-fade {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  h1 {
    font-size: 1.4rem;
    font-weight: 600;
    margin-bottom: 0.5rem;
    color: #fff;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 2rem;
  }

  .status-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
  }

  .status-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.85rem 1.2rem;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 10px;
    transition: all 0.3s ease;
  }

  .status-item:hover {
    background: rgba(255, 255, 255, 0.05);
    border-color: rgba(255, 255, 255, 0.1);
  }

  .status-label {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.9rem;
    font-weight: 500;
  }

  .status-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    background: rgba(255, 255, 255, 0.05);
  }

  .status-badge {
    font-size: 0.75rem;
    font-weight: 500;
    padding: 0.25rem 0.7rem;
    border-radius: 20px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-ok {
    background: rgba(72, 187, 120, 0.15);
    color: #48bb78;
    border: 1px solid rgba(72, 187, 120, 0.3);
  }

  .badge-warn {
    background: rgba(237, 137, 54, 0.15);
    color: #ed8936;
    border: 1px solid rgba(237, 137, 54, 0.3);
  }

  .badge-err {
    background: rgba(245, 101, 101, 0.15);
    color: #f56565;
    border: 1px solid rgba(245, 101, 101, 0.3);
  }

  .footer {
    margin-top: 2.5rem;
    font-size: 0.7rem;
    color: #333;
    letter-spacing: 0.1em;
  }

  .uptime {
    font-size: 0.75rem;
    color: #444;
    margin-top: 0.3rem;
  }

  .logout-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    padding: 0.4rem 0.8rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: #666;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #999;
  }

  .nav-link {
    display: inline-block;
    margin-top: 1.5rem;
    font-size: 0.75rem;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-link:hover { color: #999; }
</style>
</head>
<body>
<button class="logout-btn" onclick="logout()">Sign Out</button>
<div class="container">
  <div class="pulse-wrapper">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="pulse-core"><img src="/static/clai-icon.png" alt="Clai"></div>
  </div>
  <div class="standby-text">Standby</div>
  <h1>{{BOT_NAME}}</h1>
  <p class="subtitle">System Status Dashboard</p>
  <div class="status-grid" id="status-grid"></div>
  <div class="uptime" id="uptime"></div>
  <div class="footer">{{BOT_NAME}} &mdash; Telegram Bot</div>
  <div style="margin-top: 1.5rem;">
    <a href="/keys" class="nav-link">API Keys &rarr;</a>
    <a href="/tools" class="nav-link">Tools &rarr;</a>
    <a href="/settings" class="nav-link">Settings &rarr;</a>
  </div>
</div>
<script>
const SERVICES = [
  { id: 'bot',         label: 'Telegram Bot', icon: '&#9993;' },
  { id: 'tailscale',   label: 'Tailscale',     icon: '&#9830;' },
  { id: 'funnel',      label: 'Funnel',        icon: '&#9711;' },
  { id: 'venv',        label: 'Environment',   icon: '&#9881;' },
  { id: 'credentials', label: 'Credentials',   icon: '&#9919;' },
];

function badgeClass(ok, detail) {
  if (ok) return 'badge-ok';
  if (detail === 'not configured' || detail === 'not installed' || detail === 'not created') return 'badge-err';
  return 'badge-warn';
}

function render(data) {
  const grid = document.getElementById('status-grid');
  grid.innerHTML = SERVICES.map(s => {
    const item = data[s.id] || { ok: false, detail: 'unknown' };
    const cls = badgeClass(item.ok, item.detail);
    return '<div class="status-item">' +
      '<div class="status-label">' +
        '<div class="status-icon">' + s.icon + '</div>' +
        s.label +
      '</div>' +
      '<span class="status-badge ' + cls + '">' + item.detail + '</span>' +
    '</div>';
  }).join('');

  if (data.uptime) {
    document.getElementById('uptime').textContent = 'Uptime: ' + data.uptime;
  }
}

async function poll() {
  try {
    const res = await fetch('/api/status');
    if (res.status === 401) {
      window.location.href = '/';
      return;
    }
    const data = await res.json();
    render(data);
  } catch (e) {
    console.error('poll error', e);
  }
}

function logout() {
  fetch('/logout', { method: 'POST' }).then(() => {
    window.location.href = '/';
  });
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
