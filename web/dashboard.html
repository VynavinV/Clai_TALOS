<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOT_NAME}} — Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    background: rgba(255,255,255,0.02);
    border-right: 1px solid rgba(255,255,255,0.06);
    padding: 1.5rem 0;
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }
  .sidebar-brand {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0 1.2rem;
    margin-bottom: 2rem;
  }
  .sidebar-brand img {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(99,179,237,0.3);
  }
  .sidebar-brand span {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }
  .nav-items { flex: 1; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.65rem 1.2rem;
    font-size: 0.85rem;
    color: #888;
    text-decoration: none;
    transition: all 0.15s;
    border-left: 3px solid transparent;
  }
  .nav-item:hover { color: #ccc; background: rgba(255,255,255,0.03); }
  .nav-item.active {
    color: #63b3ed;
    background: rgba(99,179,237,0.06);
    border-left-color: #63b3ed;
  }
  .nav-item .icon { width: 18px; text-align: center; font-size: 0.9rem; }
  .nav-bottom {
    padding: 0 1.2rem;
    border-top: 1px solid rgba(255,255,255,0.06);
    padding-top: 1rem;
  }
  .nav-bottom .nav-item { padding-left: 1.2rem; }

  /* ── Main ── */
  .main {
    margin-left: 220px;
    flex: 1;
    padding: 2rem 2.5rem;
    max-width: 900px;
  }
  .page-title {
    font-size: 1.5rem;
    font-weight: 600;
    color: #fff;
    margin-bottom: 0.3rem;
  }
  .page-sub {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 2rem;
  }

  /* ── Status Cards ── */
  .status-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .status-card {
    padding: 1.2rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    transition: all 0.2s;
  }
  .status-card:hover { border-color: rgba(255,255,255,0.1); }
  .status-card .card-label {
    font-size: 0.72rem;
    font-weight: 500;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.6rem;
  }
  .status-card .card-value {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .dot-ok { background: #48bb78; box-shadow: 0 0 6px rgba(72,187,120,0.5); }
  .dot-warn { background: #ed8936; box-shadow: 0 0 6px rgba(237,137,54,0.5); }
  .dot-err { background: #f56565; box-shadow: 0 0 6px rgba(245,101,101,0.5); }
  .status-card .card-text {
    font-size: 0.9rem;
    font-weight: 500;
  }

  /* ── Quick Actions ── */
  .quick-actions {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    margin-bottom: 2rem;
  }
  .quick-btn {
    padding: 0.6rem 1.2rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: #999;
    font-size: 0.8rem;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .quick-btn:hover { background: rgba(255,255,255,0.06); color: #ccc; }

  .uptime-bar {
    font-size: 0.75rem;
    color: #444;
    margin-top: 1rem;
  }

  /* ── Mobile ── */
  .mobile-header {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 56px;
    background: #0a0a0f;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    z-index: 20;
    align-items: center;
    padding: 0 1rem;
    gap: 0.7rem;
  }
  .mobile-header img { width: 28px; height: 28px; border-radius: 50%; }
  .mobile-header span { font-weight: 600; color: #fff; font-size: 0.95rem; }
  .hamburger {
    background: none; border: none; color: #888; font-size: 1.4rem;
    cursor: pointer; margin-left: auto; padding: 0.3rem;
  }
  .sidebar-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9;
  }

  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      transition: transform 0.2s;
    }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .mobile-header { display: flex; }
    .main { margin-left: 0; padding: 72px 1rem 2rem; }
  }
</style>
</head>
<body>

<div class="mobile-header">
  <img src="/static/clai-icon.png" alt="">
  <span>{{BOT_NAME}}</span>
  <button class="hamburger" onclick="toggleSidebar()">&#9776;</button>
</div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <img src="/static/clai-icon.png" alt="Clai">
    <span>{{BOT_NAME}}</span>
  </div>
  <div class="nav-items">
    <a href="/dashboard" class="nav-item active"><span class="icon">&#9632;</span> Dashboard</a>
    <a href="/keys" class="nav-item"><span class="icon">&#9919;</span> API Keys</a>
    <a href="/tools" class="nav-item"><span class="icon">&#9881;</span> Tools</a>
    <a href="/settings" class="nav-item"><span class="icon">&#9881;</span> Settings</a>
    <a href="/projects" class="nav-item"><span class="icon">&#9830;</span> Projects</a>
    <a href="/static/chat.html" class="nav-item"><span class="icon">&#9993;</span> Chat</a>
  </div>
  <div class="nav-bottom">
    <a href="#" class="nav-item" onclick="logout(); return false;"><span class="icon">&#10140;</span> Sign Out</a>
  </div>
</nav>

<main class="main">
  <h1 class="page-title">Dashboard</h1>
  <p class="page-sub">System status overview</p>

  <div class="status-grid" id="status-grid"></div>

  <div class="quick-actions">
    <a href="/static/chat.html" class="quick-btn">&#9993; Open Chat</a>
    <a href="/keys" class="quick-btn">&#9919; Manage Keys</a>
    <a href="/settings" class="quick-btn">&#9881; Settings</a>
    <button class="quick-btn" onclick="hotReload()">&#8635; Hot Reload</button>
  </div>

  <div class="uptime-bar" id="uptime"></div>
</main>

<script>
var SERVICES = [
  { id: 'bot', label: 'Telegram Bot' },
  { id: 'tailscale', label: 'Tailscale' },
  { id: 'funnel', label: 'Funnel' },
  { id: 'venv', label: 'Environment' },
  { id: 'credentials', label: 'Credentials' },
];

function dotClass(ok, detail) {
  if (ok) return 'dot-ok';
  if (detail === 'not configured' || detail === 'not installed' || detail === 'not created') return 'dot-err';
  return 'dot-warn';
}

function render(data) {
  var grid = document.getElementById('status-grid');
  grid.innerHTML = SERVICES.map(function(s) {
    var item = data[s.id] || { ok: false, detail: 'unknown' };
    return '<div class="status-card">'
      + '<div class="card-label">' + s.label + '</div>'
      + '<div class="card-value">'
      + '<div class="status-dot ' + dotClass(item.ok, item.detail) + '"></div>'
      + '<span class="card-text">' + item.detail + '</span>'
      + '</div></div>';
  }).join('');
  if (data.uptime) document.getElementById('uptime').textContent = 'Uptime: ' + data.uptime;
}

async function poll() {
  try {
    var res = await fetch('/api/status');
    if (res.status === 401) { window.location.href = '/'; return; }
    render(await res.json());
  } catch (e) {}
}

async function hotReload() {
  try {
    await fetch('/api/reload', { method: 'POST' });
  } catch (e) {}
}

function logout() {
  fetch('/logout', { method: 'POST' }).then(function() { window.location.href = '/'; });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}

poll();
setInterval(poll, 5000);
</script>
</body>
</html>
