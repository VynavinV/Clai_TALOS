<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOT_NAME}} — Projects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0a0f;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 2rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 600;
    margin-bottom: 0.3rem;
    color: #fff;
  }

  .subtitle {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 2rem;
  }

  .nav {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .nav a {
    font-size: 0.85rem;
    color: #555;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav a:hover { color: #999; }
  .nav a.active { color: #63b3ed; }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1rem;
  }

  .project-card {
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.06);
    border-radius: 12px;
    padding: 1.5rem;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 0.8rem;
  }

  .project-card:hover {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(99, 179, 237, 0.3);
    transform: translateY(-2px);
  }

  .project-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #fff;
  }

  .project-desc {
    font-size: 0.85rem;
    color: #888;
    line-height: 1.4;
  }

  .project-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: auto;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .status-dot.ready {
    background: #48bb78;
    box-shadow: 0 0 6px rgba(72, 187, 120, 0.5);
  }

  .status-dot.empty {
    background: #ed8936;
    box-shadow: 0 0 6px rgba(237, 137, 54, 0.5);
  }

  .status-text {
    font-size: 0.75rem;
    color: #666;
  }

  .project-link {
    display: inline-block;
    margin-top: 0.5rem;
    padding: 0.45rem 1rem;
    background: rgba(99, 179, 237, 0.12);
    border: 1px solid rgba(99, 179, 237, 0.25);
    border-radius: 8px;
    color: #63b3ed;
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    transition: all 0.2s;
    align-self: flex-start;
  }

  .project-link:hover {
    background: rgba(99, 179, 237, 0.22);
  }

  .project-link.disabled {
    opacity: 0.3;
    pointer-events: none;
  }

  .empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: #444;
  }

  .empty-state p {
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
  }

  .empty-state .hint {
    font-size: 0.8rem;
    color: #333;
  }

  .logout-btn {
    position: fixed;
    top: 1rem;
    right: 1rem;
    padding: 0.4rem 0.8rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    color: #666;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .logout-btn:hover {
    background: rgba(255,255,255,0.08);
    color: #999;
  }

  .project-count {
    font-size: 0.8rem;
    color: #444;
    margin-bottom: 1.5rem;
  }
</style>
</head>
<body>
<button class="logout-btn" onclick="logout()">Sign Out</button>
<div class="container">
  <div class="nav">
    <a href="/dashboard">&larr; Dashboard</a>
    <a href="/keys">API Keys</a>
    <a href="/tools">Tools</a>
    <a href="/settings">Settings</a>
    <a href="/projects" class="active">Projects</a>
  </div>

  <h1>Projects</h1>
  <p class="subtitle">Websites, presentations, and apps created by {{BOT_NAME}}</p>
  <div class="project-count" id="count"></div>
  <div class="projects-grid" id="grid"></div>
</div>

<script>
async function loadProjects() {
  try {
    var res = await fetch('/api/projects');
    if (res.status === 401) { window.location.href = '/'; return; }
    var projects = await res.json();

    var countEl = document.getElementById('count');
    var grid = document.getElementById('grid');

    if (!projects.length) {
      countEl.textContent = '';
      grid.innerHTML = '<div class="empty-state"><p>No projects yet</p><p class="hint">Ask the bot to create a website or presentation</p></div>';
      return;
    }

    countEl.textContent = projects.length + ' project' + (projects.length === 1 ? '' : 's');

    grid.innerHTML = projects.map(function(p) {
      var ready = p.has_index;
      var statusClass = ready ? 'ready' : 'empty';
      var statusText = ready ? 'Live' : 'No index.html';
      var linkClass = ready ? 'project-link' : 'project-link disabled';
      var desc = p.description || 'No description';

      return '<div class="project-card">' +
        '<div class="project-name">' + escapeHtml(p.name) + '</div>' +
        '<div class="project-desc">' + escapeHtml(desc) + '</div>' +
        '<div class="project-meta">' +
          '<div class="status-dot ' + statusClass + '"></div>' +
          '<span class="status-text">' + statusText + '</span>' +
        '</div>' +
        '<a href="' + escapeHtml(p.url) + '" target="_blank" class="' + linkClass + '">Open &rarr;</a>' +
      '</div>';
    }).join('');
  } catch (e) {
    console.error(e);
  }
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function logout() {
  fetch('/logout', { method: 'POST' }).then(function() {
    window.location.href = '/';
  });
}

loadProjects();
</script>
</body>
</html>
