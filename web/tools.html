<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{BOT_NAME}} — Tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; }
  .sidebar { width: 220px; background: rgba(255,255,255,0.02); border-right: 1px solid rgba(255,255,255,0.06); padding: 1.5rem 0; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 10; }
  .sidebar-brand { display: flex; align-items: center; gap: 0.7rem; padding: 0 1.2rem; margin-bottom: 2rem; }
  .sidebar-brand img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(99,179,237,0.3); }
  .sidebar-brand span { font-size: 1rem; font-weight: 600; color: #fff; }
  .nav-items { flex: 1; }
  .nav-item { display: flex; align-items: center; gap: 0.7rem; padding: 0.65rem 1.2rem; font-size: 0.85rem; color: #888; text-decoration: none; transition: all 0.15s; border-left: 3px solid transparent; }
  .nav-item:hover { color: #ccc; background: rgba(255,255,255,0.03); }
  .nav-item.active { color: #63b3ed; background: rgba(99,179,237,0.06); border-left-color: #63b3ed; }
  .nav-item .icon { width: 18px; text-align: center; font-size: 0.9rem; }
  .nav-bottom { padding: 0 1.2rem; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1rem; }
  .main { margin-left: 220px; flex: 1; padding: 2rem 2.5rem; max-width: 1000px; }
  .page-title { font-size: 1.5rem; font-weight: 600; color: #fff; margin-bottom: 0.3rem; }
  .page-sub { font-size: 0.85rem; color: #666; margin-bottom: 2rem; }

  .tool-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
  .tool-card { padding: 1rem; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; transition: all 0.2s; }
  .tool-card:hover { background: rgba(255,255,255,0.05); }
  .tool-card.disabled { opacity: 0.5; }
  .tool-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
  .tool-name { font-size: 0.9rem; font-weight: 600; }
  .toggle { position: relative; width: 40px; height: 22px; background: rgba(255,255,255,0.1); border-radius: 11px; cursor: pointer; transition: background 0.3s; }
  .toggle.on { background: rgba(72,187,120,0.4); }
  .toggle::after { content: ''; position: absolute; width: 18px; height: 18px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.3s; }
  .toggle.on::after { transform: translateX(18px); }
  .tool-desc { font-size: 0.78rem; color: #888; line-height: 1.4; }
  .tool-meta { font-size: 0.68rem; color: #555; margin-top: 0.4rem; }

  .btn { padding: 0.65rem 1.5rem; background: rgba(99,179,237,0.15); border: 1px solid rgba(99,179,237,0.3); border-radius: 8px; color: #63b3ed; font-size: 0.85rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn:hover { background: rgba(99,179,237,0.25); }
  .msg { font-size: 0.8rem; margin-top: 0.75rem; min-height: 1.2em; }
  .msg-ok { color: #48bb78; } .msg-err { color: #f56565; }

  .mobile-header { display: none; position: fixed; top: 0; left: 0; right: 0; height: 56px; background: #0a0a0f; border-bottom: 1px solid rgba(255,255,255,0.06); z-index: 20; align-items: center; padding: 0 1rem; gap: 0.7rem; }
  .mobile-header img { width: 28px; height: 28px; border-radius: 50%; }
  .mobile-header span { font-weight: 600; color: #fff; font-size: 0.95rem; }
  .hamburger { background: none; border: none; color: #888; font-size: 1.4rem; cursor: pointer; margin-left: auto; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9; }
  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); transition: transform 0.2s; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .mobile-header { display: flex; }
    .main { margin-left: 0; padding: 72px 1rem 2rem; }
  }
</style>
</head>
<body>
<div class="mobile-header"><img src="/static/clai-icon.png" alt=""><span>{{BOT_NAME}}</span><button class="hamburger" onclick="toggleSidebar()">&#9776;</button></div>
<div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-brand"><img src="/static/clai-icon.png" alt="Clai"><span>{{BOT_NAME}}</span></div>
  <div class="nav-items">
    <a href="/dashboard" class="nav-item"><span class="icon">&#9632;</span> Dashboard</a>
    <a href="/keys" class="nav-item"><span class="icon">&#9919;</span> API Keys</a>
    <a href="/tools" class="nav-item active"><span class="icon">&#9881;</span> Tools</a>
    <a href="/settings" class="nav-item"><span class="icon">&#9881;</span> Settings</a>
    <a href="/projects" class="nav-item"><span class="icon">&#9830;</span> Projects</a>
    <a href="/static/chat.html" class="nav-item"><span class="icon">&#9993;</span> Chat</a>
  </div>
  <div class="nav-bottom"><a href="#" class="nav-item" onclick="logout(); return false;"><span class="icon">&#10140;</span> Sign Out</a></div>
</nav>

<main class="main">
  <h1 class="page-title">Tools</h1>
  <p class="page-sub">Enable or disable AI capabilities</p>
  <div class="tool-grid" id="tool-grid"></div>
  <button class="btn" onclick="saveTools()">Save Changes</button>
  <div class="msg" id="msg"></div>
</main>

<script>
var tools = [
  { id: 'execute_command', name: 'Terminal', desc: 'Execute shell commands', category: 'system', dangerous: true },
  { id: 'execute_workflow', name: 'Workflow', desc: 'Multi-step command sequences', category: 'system', dangerous: true },
  { id: 'save_memory', name: 'Memory Save', desc: 'Store information for later', category: 'memory' },
  { id: 'search_memories', name: 'Memory Search', desc: 'Search stored memories', category: 'memory' },
  { id: 'list_memories', name: 'Memory List', desc: 'List all memories', category: 'memory' },
  { id: 'delete_memory', name: 'Memory Delete', desc: 'Delete a memory', category: 'memory' },
  { id: 'update_memory', name: 'Memory Update', desc: 'Update a memory', category: 'memory' },
  { id: 'set_model_prefs', name: 'Model Prefs', desc: 'Set model preferences', category: 'system' },
  { id: 'schedule_cron', name: 'Cron Schedule', desc: 'Schedule recurring tasks', category: 'automation' },
  { id: 'list_cron', name: 'Cron List', desc: 'List scheduled jobs', category: 'automation' },
  { id: 'remove_cron', name: 'Cron Remove', desc: 'Remove a scheduled job', category: 'automation' },
  { id: 'web_search', name: 'Web Search', desc: 'Search the web', category: 'web' },
  { id: 'scrape_url', name: 'Web Scrape', desc: 'Extract web page content', category: 'web' },
  { id: 'google_execute', name: 'Google', desc: 'Google Apps Script bridge', category: 'web' },
  { id: 'email_execute', name: 'Email', desc: 'Send/read email via Himalaya', category: 'communication' },
  { id: 'spawn_subagent', name: 'Subagent', desc: 'Spawn parallel subagents', category: 'advanced' },
  { id: 'send_telegram_message', name: 'Telegram Msg', desc: 'Send Telegram messages', category: 'communication' },
  { id: 'send_voice_message', name: 'Voice', desc: 'Send voice responses', category: 'communication' },
  { id: 'read_file', name: 'Read File', desc: 'Read file contents', category: 'files' },
  { id: 'write_file', name: 'Write File', desc: 'Create or overwrite files', category: 'files', dangerous: true },
  { id: 'edit_file', name: 'Edit File', desc: 'Find and replace in files', category: 'files', dangerous: true },
  { id: 'spreadsheet_execute', name: 'Spreadsheet', desc: 'XLSX read/edit/recalc/validate/color rules', category: 'files' },
  { id: 'docx_execute', name: 'DOCX', desc: 'DOCX create/edit/track changes/validate XML', category: 'files' },
  { id: 'create_project', name: 'Create Project', desc: 'Create live websites/apps', category: 'projects' },
  { id: 'list_projects', name: 'List Projects', desc: 'List all projects', category: 'projects' }
];
var enabledTools = {};

async function loadTools() {
  try {
    var res = await fetch('/api/tools');
    if (res.status === 401) { window.location.href = '/'; return; }
    enabledTools = await res.json();
    render();
  } catch (e) {}
}

function render() {
  document.getElementById('tool-grid').innerHTML = tools.map(function(t) {
    var on = enabledTools[t.id] !== false;
    return '<div class="tool-card' + (on ? '' : ' disabled') + '" id="tool-' + t.id + '">'
      + '<div class="tool-header"><span class="tool-name">' + t.name + '</span>'
      + '<div class="toggle' + (on ? ' on' : '') + '" onclick="toggleTool(\'' + t.id + '\')"></div></div>'
      + '<div class="tool-desc">' + t.desc + '</div>'
      + '<div class="tool-meta">' + t.category + (t.dangerous ? ' &middot; <span style="color:#f56565;">dangerous</span>' : '') + '</div>'
      + '</div>';
  }).join('');
}

function toggleTool(id) { enabledTools[id] = enabledTools[id] === false; render(); }

function showMsg(t, ok) { var el = document.getElementById('msg'); el.textContent = t; el.className = 'msg ' + (ok ? 'msg-ok' : 'msg-err'); setTimeout(function() { el.textContent = ''; }, 3000); }

async function saveTools() {
  try {
    var res = await fetch('/api/tools', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(enabledTools) });
    if (res.status === 401) { window.location.href = '/'; return; }
    var data = await res.json();
    if (data.ok) showMsg('Saved', true); else showMsg(data.error || 'Failed', false);
  } catch (e) { showMsg('Network error', false); }
}

function logout() { fetch('/logout', { method: 'POST' }).then(function() { window.location.href = '/'; }); }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('sidebar-overlay').classList.toggle('open'); }
loadTools();
</script>
</body>
</html>
